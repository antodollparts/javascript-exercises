<!--Proyecto basado en en el proyecto de frontend mentor-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/x-icon" href="public/favicon.ico"/>
</head>
<body>

  <h1>Password Generator</h1>

  <div class="card">

    <!-- Output -->
    <div class="pwd-row">
      <span id="pwd-output">PTx1f5DaFX</span>
      <button class="copy-btn" id="copy-btn" title="Copiar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="copy-toast" id="copy-toast">COPIADO</span>
      </button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div>
        <div class="slider-row">
          <span class="slider-label">Character Length</span>
          <span class="slider-val" id="len-val">10</span>
        </div>
        <input type="range" id="length" min="8" max="32" value="10"/>
      </div>

      <div class="checks">
        <label class="check-item">
          <input type="checkbox" id="uc" checked/>
          <span class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="#0a0c0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </span>
          <span class="check-label">Include Uppercase Letters</span>
        </label>

        <label class="check-item">
          <input type="checkbox" id="lc" checked/>
          <span class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="#0a0c0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </span>
          <span class="check-label">Include Lowercase Letters</span>
        </label>

        <label class="check-item">
          <input type="checkbox" id="nums" checked/>
          <span class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="#0a0c0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </span>
          <span class="check-label">Include Numbers</span>
        </label>

        <label class="check-item">
          <input type="checkbox" id="syms"/>
          <span class="check-box">
            <svg viewBox="0 0 12 12" fill="none" stroke="#0a0c0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5,6 5,9.5 10.5,2.5"/>
            </svg>
          </span>
          <span class="check-label">Include Symbols</span>
        </label>
      </div>
    </div>

    <!-- Strength -->
    <div class="strength-row" id="strength-row">
      <span class="strength-tag">Strength</span>
      <div class="strength-right">
        <span class="strength-label" id="strength-label">MEDIUM</span>
        <div class="bars">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </div>

    <!-- Generate -->
    <button class="gen-btn" id="gen-btn">
      GENERATE
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12,5 19,12 12,19"/>
      </svg>
    </button>

  </div>

  <script src="main.js"></script>
</body>
</html>
